{% extends "base.html" %}

{% block title %}Quên Mật khẩu{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Quên Mật khẩu</h3>
                <p class="text-muted text-center">
                    Nhập Tên đăng nhập và Email để xác thực.
                    Với tài khoản <strong>admin</strong>, bạn cần nhập thêm mật khẩu mới để đặt lại trực tiếp.
                </p>
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Tên đăng nhập</label>
                        <input type="text" name="username" id="username" class="form-control" placeholder="Ví dụ: admin" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" name="email" id="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="new_password" class="form-label">Mật khẩu mới (chỉ bắt buộc cho admin)</label>
                        <input type="password" name="new_password" id="new_password" class="form-control" minlength="8">
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Xác nhận mật khẩu mới</label>
                        <input type="password" name="confirm_password" id="confirm_password" class="form-control" minlength="8">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Xác nhận đặt lại mật khẩu</button>
                    </div>
                </form>
                 <hr>
                <div class="text-center">
                    <a href="{{ url_for('login') }}">Quay lại trang Đăng nhập</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
